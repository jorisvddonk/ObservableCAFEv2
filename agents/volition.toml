name = "volition"
description = "Conversational agent with TTS — responds with audio via Voicebox"
background = false
allows_reload = true
persists_state = true

[[steps]]
id = "trust-filter"
type = "trust-filter"
trigger = "user_message"

[[steps]]
id = "llm"
type = "llm"
trigger = "user_message"

[[steps]]
id = "tts"
type = "tts"
trigger = "llm_complete"
enabled_if = "config.tts.enabled"

[initial_chunk]
type = "null"

[initial_chunk.annotations]
"config.type"                = "runtime"
"config.llm.system_prompt"   = "You are Volition, a concise and thoughtful assistant. Keep responses short and natural — they will be spoken aloud."
"config.llm.temperature"     = 0.7
"config.tts.profile"         = "Volition"
"config.tts.enabled"         = true
