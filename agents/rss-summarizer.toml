name = "rss-summarizer"
description = "Fetches and summarizes RSS feeds daily"
background = true
allows_reload = true
persists_state = false
schedule = "0 7 * * *"

[[steps]]
id = "rss-fetch"
type = "rss-fetch"
trigger = "scheduler_tick"

[[steps]]
id = "llm-summarize"
type = "llm-summarize"
trigger = "step_complete:rss-fetch"

[initial_chunk]
type = "null"

[initial_chunk.annotations]
"config.type" = "runtime"
"config.rss.url" = "https://news.ycombinator.com/rss"
