name = "rss-summarizer"
description = "Fetches and summarizes RSS feeds daily"
background = true
allows_reload = true
persists_state = false
schedule = "0 7 * * *"
pipeline = ["rss-fetch", "llm-summarize"]

# Seed the session with a runtime config null chunk so resolve_session_config
# can read config.rss.url (and any other evaluator config) from history.
[initial_chunk]
type = "null"

[initial_chunk.annotations]
"config.type" = "runtime"
"config.rss.url" = "https://news.ycombinator.com/rss"
