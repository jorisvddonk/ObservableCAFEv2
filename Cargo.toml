[workspace]
resolver = "2"
members = [
    "cafe-types",
    "cafe-bus",
    "cafe-store",
    "cafe-llm",
    "cafe-server",
    "cafe-tui",
    "cafe-agent-runtime",
]

# Shared dependency versions — pin once here, reference everywhere
[workspace.dependencies]
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
tokio       = { version = "1", features = ["full"] }
tracing     = "0.1"
tracing-subscriber = "0.3"
anyhow      = "1"
