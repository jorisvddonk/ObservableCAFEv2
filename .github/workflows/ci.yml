name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: cargo build --release --workspace

      - name: Run unit tests
        run: cargo test --release --workspace

      - name: Run benchmarks (smoke test)
        run: cargo bench --no-run -p cafe-types -p cafe-bus

      - name: Run E2E bus tests
        run: |
          uv run tests/bus-filters-e2e.py
          uv run tests/source-connection-e2e.py
          uv run tests/ephemeral-sessions-e2e.py
          uv run tests/tts-e2e.py
          uv run tests/stt-e2e.py
