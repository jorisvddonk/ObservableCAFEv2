version: "0.5"

processes:
  cafe-bus:
    command: ./target/debug/cafe-bus
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "test -S /tmp/cafe-bus.sock"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10

  cafe-store:
    command: ./target/debug/cafe-store
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy

  cafe-binary-store:
    command: ./target/debug/cafe-binary-store --port 4002 --bus-socket /tmp/cafe-bus.sock
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 2
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy

  cafe-llm:
    command: ./target/debug/cafe-llm
    environment:
      - "RUST_BACKTRACE=1"
      - "LLM_BACKEND=openai"
      - "OPENAI_URL=http://localhost:8080"
      - "OPENAI_MODEL=gemma3:1b"
      - "MODEL_LIST_URLS=http://localhost:8079"
      - "OLLAMA_URL=http://localhost:8080"
      - "OLLAMA_MODEL=gemma3:1b"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy

  cafe-agent-runtime:
    command: ./target/debug/cafe-agent-runtime
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
      cafe-store:
        condition: process_healthy

  cafe-server:
    command: ./target/debug/cafe-server
    environment:
      - "PORT=4000"
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
      cafe-store:
        condition: process_healthy

  cafe-telegram:
    command: ./cafe-telegram/cafe-telegram
    environment:
      - "TELEGRAM_TOKEN="
      - "CAFE_SERVER_URL=http://localhost:4000"
    disabled: true
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-server:
        condition: process_healthy

  cafe-web-static:
    command: npx http-server dist -p 8081 --cors
    working_dir: ./cafe-web
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-server:
        condition: process_healthy

  cafe-tts:
    command: ./target/debug/cafe-tts
    environment:
      - "RUST_BACKTRACE=1"
      - "VOICEBOX_URL=http://127.0.0.1:17493"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
    # Optional — only meaningful when Voicebox is running.
    # Set disabled: true if you don't have Voicebox available.
    disabled: false

  cafe-comfy:
    command: ./target/debug/cafe-comfy
    environment:
      - "RUST_BACKTRACE=1"
      - "COMFY_URL=http://127.0.0.1:8188"
      - "COMFY_WORKFLOW_PATH=./cafe-comfy/workflow.json"
      - "COMFY_WORKFLOW_INPUT_NODE=6"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
    # Optional — only meaningful when a ComfyUI server is running.
    # Set disabled: true if you don't have ComfyUI available.
    disabled: false

  cafe-sheetbot:
    command: ./target/debug/cafe-sheetbot
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
    # Optional — only meaningful when a SheetBot server is running.
    # Set disabled: true if you don't have SheetBot available.
    disabled: false

  cafe-stt:
    command: ./target/debug/cafe-stt
    environment:
      - "RUST_BACKTRACE=1"
      - "VOICEBOX_URL=http://127.0.0.1:17493"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
    disabled: false

  cafe-web-fetch:
    command: ./target/debug/cafe-web-fetch
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy

  cafe-knowledgebase:
    command: ./target/debug/cafe-knowledgebase
    environment:
      - "RUST_BACKTRACE=1"
      - "CAFE_KNOWLEDGEBASE_EMBED_URL=http://localhost:11434/api/embed"
      - "CAFE_KNOWLEDGEBASE_EMBED_MODEL=nomic-embed-text"
      - "CAFE_KNOWLEDGEBASE_DB_PATH=./knowledgebase.lance"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy

  cafe-demo:
    command: ./target/debug/cafe-demo
    environment:
      - "RUST_BACKTRACE=1"
    readiness_probe:
      exec:
        command: "true"
      initial_delay_seconds: 1
      period_seconds: 1
      failure_threshold: 10
    depends_on:
      cafe-bus:
        condition: process_healthy
    # One-shot demo: publishes demo chunks (text, audio, image, error) to a "demo" session.
    # Set disabled: false to run on startup.
    disabled: true
